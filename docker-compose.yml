version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: pricewatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pricedb
      POSTGRES_USER: priceuser
      POSTGRES_PASSWORD: pricepass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priceuser -d pricedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pricewatch-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://priceuser:pricepass@db:5432/pricedb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: pricewatch-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
